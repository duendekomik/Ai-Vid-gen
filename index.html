<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Generator v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-5 flex flex-col items-center">
    <header class="mb-10 text-center">
        <h1 class="text-4xl font-bold text-blue-400">AI Video Gen PRO</h1>
        <p class="text-gray-400">Ubah teks menjadi video manhwa secara instan</p>
    </header>

    <main class="w-full max-w-2xl bg-gray-800 p-6 rounded-xl shadow-2xl">
        <div class="mb-4">
            <label class="block mb-2 font-semibold">Masukkan Prompt Cerita:</label>
            <textarea id="prompt" class="w-full p-3 rounded bg-gray-700 border border-gray-600 focus:border-blue-500 outline-none h-32" placeholder="Contoh: Seorang pendekar di puncak gunung, gaya manhwa..."></textarea>
        </div>

        <button id="genBtn" onclick="generateVideo()" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold transition">Generate Video</button>

        <div id="loading" class="hidden mt-8 text-center">
            <div class="animate-spin inline-block w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full mb-2"></div>
            <p class="text-yellow-400">AI sedang melukis video Anda... (30-60 detik)</p>
        </div>

        <div id="result" class="hidden mt-8 border-t border-gray-700 pt-6 text-center">
            <h2 class="text-xl font-bold mb-4">Hasil Video:</h2>
            <video id="videoPlayer" controls class="w-full rounded-lg border-2 border-blue-500 shadow-lg"></video>
            <a id="downloadBtn" download="ai-video.mp4" class="mt-4 inline-block text-blue-400 underline">Unduh Video</a>
        </div>
    </main>

    <script>
        async function generateVideo() {
            const prompt = document.getElementById('prompt').value;
            const btn = document.getElementById('genBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const videoPlayer = document.getElementById('videoPlayer');

            if (!prompt) return alert("Harap isi prompt!");

            const HF_TOKEN = "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";

            btn.disabled = true;
            loading.classList.remove('hidden');
            result.classList.add('hidden');

            try {
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/stabilityai/stable-video-diffusion-img2vid-xt",
                    {
                        headers: { Authorization: `Bearer ${HF_TOKEN}` },
                        method: "POST",
                        body: JSON.stringify({ inputs: prompt }),
                    }
                );

                if (!response.ok) throw new Error("Server AI sedang sibuk atau sedang bangun. Coba klik lagi dalam 10 detik.");

                const blob = await response.blob();
                const videoUrl = URL.createObjectURL(blob);
                
                videoPlayer.src = videoUrl;
                document.getElementById('downloadBtn').href = videoUrl;
                
                loading.classList.add('hidden');
                result.classList.remove('hidden');
            } catch (error) {
                alert(error.message);
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
